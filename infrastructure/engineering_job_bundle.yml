resources:
  jobs:
    cf-engineering-job:
      name: cf-engineering-job-${bundle.target}
      trigger:
        pause_status: UNPAUSED
        file_arrival:
          url: s3://cf-engineering-bucket-dev/engineering_dev/raw/
      tasks:
        - task_key: s3_to_master
          spark_python_task:
            python_file: ${workspace.file_path}/src/01_engineering_chain/production_standard.py
          environment_key: Default
        - task_key: s3_to_master_sp
          spark_python_task:
            python_file: ${workspace.file_path}/src/01_engineering_chain/production_standard_sp.py
          environment_key: Default
      environments:
        - environment_key: Default
          spec:
            environment_version: "5"
      permissions:
        - group_name: users
          level: CAN_VIEW