resources:
  pipelines:
    cf_mom_factory_pipeline:
      name: cf-mom-factory-pipeline-${bundle.target}
      development: false
      continuous: false
      channel: CURRENT
      photon: true
      serverless: true
      catalog: cf_mom_factory_${bundle.target}
      schema: default
      libraries:
        - file:
            path: ${workspace.file_path}/src/02_mom_factory/01_s3_to_bronze.py
        - file:
            path: ${workspace.file_path}/src/02_mom_factory/02_bronze_to_silver.py
        - file:
            path: ${workspace.file_path}/src/02_mom_factory/03_silver_to_gold.py
      configuration:
        root_path: ${workspace.file_path}/src/02_mom_factory
      permissions:
        - group_name: users
          level: CAN_VIEW